<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Jo Silva PT · Registo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--bg2:#111;--bg3:#1a1a1a;
  --border:#1e1e1e;--border2:#2a2a2a;
  --gold:#C8A96E;--gold2:#8a7449;--gold3:rgba(200,169,110,.1);
  --green:#5DCA9A;--red:#e05555;
  --text:#f0f0f0;--muted:#666;--dim:#333;
  --radius:14px;--radius-sm:10px;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
button,input{font-family:'DM Sans',sans-serif}
button{cursor:pointer;border:none;background:none}

.wrap{width:100%;max-width:400px}

.logo{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);letter-spacing:5px;text-align:center;line-height:1}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:36px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;margin-bottom:6px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5}

.badge-trial{display:inline-block;background:rgba(93,202,154,.12);border:1px solid rgba(93,202,154,.3);color:var(--green);font-size:11px;font-weight:600;letter-spacing:.8px;padding:4px 10px;border-radius:20px;margin-bottom:20px}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);padding:13px 15px;font-size:15px;border-radius:var(--radius-sm);outline:none;transition:border .2s;-webkit-appearance:none}
.field input:focus{border-color:var(--gold)}
.field input::placeholder{color:var(--dim)}

.btn-reg{width:100%;background:var(--gold);color:#000;font-weight:700;font-size:15px;letter-spacing:.5px;padding:16px;border-radius:var(--radius-sm);margin-top:6px;transition:opacity .2s}
.btn-reg:active{opacity:.8}
.btn-reg:disabled{opacity:.5;cursor:not-allowed}

.msg{font-size:13px;text-align:center;margin-top:14px;min-height:18px;line-height:1.5}
.msg.err{color:var(--red)}
.msg.ok{color:var(--green)}

.divider{text-align:center;margin:20px 0;font-size:12px;color:var(--muted);position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider::before{left:0} .divider::after{right:0}

.login-link{text-align:center;font-size:13px;color:var(--muted)}
.login-link a{color:var(--gold);text-decoration:none;font-weight:600}
.login-link a:hover{text-decoration:underline}

.features{margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.feat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.feat-ico{font-size:22px;margin-bottom:4px}
.feat-label{font-size:11px;color:var(--muted);font-weight:500}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">JO SILVA PT</div>
  <div class="logo-sub">Plataforma para Personal Trainers</div>

  <div class="card">
    <div class="badge-trial">✓ 14 DIAS GRÁTIS · SEM CARTÃO</div>
    <div class="card-title">CRIAR CONTA</div>
    <div class="card-sub">Começa hoje. Cancela quando quiseres.</div>

    <div class="field">
      <label>Nome</label>
      <input type="text" id="r-nome" placeholder="O teu nome" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="r-email" placeholder="email@exemplo.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="r-senha" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="r-senha2" placeholder="Repete a senha" autocomplete="new-password">
    </div>

    <button class="btn-reg" id="btn-reg" onclick="registar()">COMEÇAR GRÁTIS →</button>
    <div class="msg" id="msg"></div>

    <div class="divider">ou</div>
    <div class="login-link">Já tens conta? <a href="admin-v3.html">Fazer login</a></div>
  </div>

  <div class="features">
    <div class="feat"><div class="feat-ico">🤖</div><div class="feat-label">IA gera treinos</div></div>
    <div class="feat"><div class="feat-ico">📊</div><div class="feat-label">Progresso visual</div></div>
    <div class="feat"><div class="feat-ico">🏆</div><div class="feat-label">Gamificação</div></div>
    <div class="feat"><div class="feat-ico">📱</div><div class="feat-label">App para o aluno</div></div>
  </div>

</div>

<script>
const SB_URL = 'https://oelbocimyfwwzkzbyswg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lbGJvY2lteWZ3d3premJ5c3dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDI2OTksImV4cCI6MjA5MzU3ODY5OX0.S2V54XWWnF58lTQNkvFU9JL1-toCQxacICvtITYL_3E';

async function registar() {
  const nome  = document.getElementById('r-nome').value.trim();
  const email = document.getElementById('r-email').value.trim().toLowerCase();
  const senha = document.getElementById('r-senha').value;
  const senha2 = document.getElementById('r-senha2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn-reg');

  msg.className = 'msg err';
  if (!nome || !email || !senha) { msg.textContent = 'Preenche todos os campos.'; return; }
  if (!email.includes('@')) { msg.textContent = 'Email inválido.'; return; }
  if (senha.length < 8) { msg.textContent = 'Senha deve ter no mínimo 8 caracteres.'; return; }
  if (senha !== senha2) { msg.textContent = 'As senhas não coincidem.'; return; }

  btn.disabled = true;
  btn.textContent = 'A criar conta...';
  msg.textContent = '';

  try {
    const r = await fetch(SB_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: senha, data: { nome } })
    });
    const d = await r.json();

    if (!r.ok || d.error) {
      msg.textContent = d.error?.message?.includes('already registered')
        ? 'Este email já está registado. Faz login.'
        : (d.error?.message || 'Erro ao criar conta.');
      btn.disabled = false;
      btn.textContent = 'COMEÇAR GRÁTIS →';
      return;
    }

    // Sucesso — guardar tokens e ir para o admin
    if (d.access_token) {
      sessionStorage.setItem('sb_access_token', d.access_token);
      localStorage.setItem('sb_refresh_token', d.refresh_token || '');
    }

    msg.className = 'msg ok';
    msg.textContent = '✓ Conta criada! A redirecionar...';
    setTimeout(() => { location.href = 'admin-v3.html'; }, 1200);

  } catch(e) {
    msg.textContent = 'Erro de ligação. Tenta novamente.';
    btn.disabled = false;
    btn.textContent = 'COMEÇAR GRÁTIS →';
  }
}

// Submit on Enter
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') registar();
});
</script>
</body>
</html>
