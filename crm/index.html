<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jo Silva Vodafone — CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --vf:#E60000;--vfd:#B30000;--ink:#0f172a;--muted:#64748b;
  --bg:#0f1117;--bg2:#161b26;--card:#1e2533;--card2:#252d3d;
  --line:#2a3347;--line2:#374151;
  --todo:#64748b;--callback:#f59e0b;--nego:#3b82f6;--won:#16a34a;--lost:#475569;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#e2e8f0;font-size:14px;min-height:100vh}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#2d0000 0%,var(--bg) 60%)}
.login-box{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .vf-icon{width:56px;height:56px;background:var(--vf);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto 14px;letter-spacing:-1px}
.login-logo h1{font-size:22px;font-weight:700;color:#fff}
.login-logo p{color:var(--muted);font-size:13px;margin-top:4px}
.lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;margin-top:14px}
.login-box input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px}
.login-box input:focus{outline:none;border-color:var(--vf)}
.btn-login{width:100%;padding:13px;background:var(--vf);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px}
.btn-login:hover{background:var(--vfd)}
#loginErr{color:#f87171;font-size:12px;text-align:center;margin-top:10px;min-height:18px}
#app{display:none}
header{background:linear-gradient(135deg,var(--vfd) 0%,var(--vf) 100%);padding:0 22px;height:58px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(230,0,0,.3)}
.hdr-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;border:2px solid rgba(255,255,255,.4);flex-shrink:0}
.hdr-name{font-weight:700;font-size:16px;color:#fff;line-height:1.1}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.8)}
.hdr-stats{display:flex;gap:8px;margin-left:auto}
.hstat{background:rgba(0,0,0,.25);border-radius:10px;padding:6px 12px;text-align:center;min-width:64px}
.hstat b{display:block;font-size:16px;color:#fff;line-height:1}
.hstat span{font-size:9px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.5px}
.hdr-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;margin-left:8px}
nav.tabs{background:var(--bg2);border-bottom:1px solid var(--line);padding:0 18px;display:flex;gap:2px;position:sticky;top:58px;z-index:40}
nav.tabs button{background:none;border:none;padding:12px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s}
nav.tabs button.active{color:#fff;border-bottom-color:var(--vf)}
nav.tabs button:hover:not(.active){color:#cbd5e1}
.crm-layout{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 112px);overflow:hidden}
.list-pane{border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:10px;background:var(--bg2)}
.search-row input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 14px;color:#fff;font-size:13px}
.search-row input:focus{outline:none;border-color:var(--vf)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:5px 10px;border:1px solid var(--line);background:transparent;border-radius:20px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.fbtn.active{background:rgba(230,0,0,.15);border-color:var(--vf);color:#fff}
.fdot{width:7px;height:7px;border-radius:50%;display:inline-block}
.contact-list{flex:1;overflow-y:auto;padding:8px}
.contact-list::-webkit-scrollbar{width:4px}
.contact-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:6px;cursor:pointer;border-left:3px solid transparent;transition:all .1s}
.ccard:hover,.ccard.selected{background:var(--card2)}
.ccard .cn{font-weight:700;font-size:13px;color:#f1f5f9;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ccard .cp{font-size:12px;color:var(--vf);font-weight:600}
.ccard .cm{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.stbadge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.atbadge{font-size:10px;color:var(--muted)}
.fid-warn{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;background:rgba(245,158,11,.15);color:#f59e0b}
.fid-urgent{background:rgba(230,0,0,.15)!important;color:#f87171!important}
.detail-pane{overflow-y:auto;background:var(--bg)}
.detail-pane::-webkit-scrollbar{width:4px}
.detail-pane::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:12px}
.detail-empty .big{font-size:48px}
.detail-content{padding:24px}
.det-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--line)}
.det-avatar{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--vfd),var(--vf));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.det-name{font-size:19px;font-weight:700;color:#f8fafc;line-height:1.2}
.det-sub{font-size:12px;color:var(--muted);margin-top:4px}
.phone-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.callbtn{display:inline-flex;align-items:center;gap:6px;background:rgba(22,163,74,.12);color:#4ade80;border:1px solid rgba(22,163,74,.3);padding:8px 14px;border-radius:9px;font-weight:700;text-decoration:none;font-size:13px}
.callbtn:hover{background:rgba(22,163,74,.22)}
.no-phone{color:var(--muted);font-size:13px;background:var(--card);border:1px solid var(--line);padding:8px 14px;border-radius:9px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.kv{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.kv-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:3px}
.kv-val{font-size:13px;color:#e2e8f0;font-weight:500}
.section{margin-bottom:18px}
.sec-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:8px}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.rbtn{padding:8px;border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;color:#cbd5e1;transition:all .1s}
.rbtn:hover{border-color:var(--vf);color:#fff}
.rbtn.sel{background:var(--vf);border-color:var(--vf);color:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
select,input[type=datetime-local],input[type=date]{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 12px;color:#fff;font-size:13px}
select:focus,input:focus{outline:none;border-color:var(--vf)}
textarea.notes{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:#e2e8f0;font-size:13px;resize:vertical;min-height:80px;font-family:inherit}
textarea.notes:focus{outline:none;border-color:var(--vf)}
.hist{margin-top:8px;max-height:240px;overflow-y:auto}
.hist-item{display:flex;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--vf);margin-top:5px;flex-shrink:0}
.hist-body{flex:1}
.hist-time{font-size:10.5px;color:var(--muted)}
.hist-text{font-size:12.5px;color:#cbd5e1;margin-top:2px}
.save-bar{position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--line);padding:14px 24px;display:flex;gap:10px;justify-content:flex-end}
.btn{padding:9px 18px;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer}
.btn-red{background:var(--vf);color:#fff}
.btn-red:hover{background:var(--vfd)}
.btn-ghost{background:var(--card);border:1px solid var(--line);color:#e2e8f0}
.btn-ghost:hover{border-color:var(--vf);color:#fff}
.fid-row{display:flex;gap:8px;align-items:center}
.fid-row input[type=date]{flex:1}
.fid-badge{font-size:11px;padding:4px 10px;border-radius:7px;font-weight:700;white-space:nowrap}
.alert-banner{background:rgba(230,0,0,.12);border:1px solid rgba(230,0,0,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12.5px;color:#fca5a5;display:flex;align-items:center;gap:8px}
.alert-amber{background:rgba(245,158,11,.1)!important;border-color:rgba(245,158,11,.3)!important;color:#fde68a!important}
#tab-noatend,#tab-agenda,#tab-guia{padding:20px 24px;max-width:960px;margin:0 auto}
.period-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.period-btn{padding:7px 14px;border:1px solid var(--line);background:var(--card);border-radius:20px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
.period-btn.active{background:rgba(230,0,0,.15);border-color:var(--vf);color:#fff}
.na-day{margin-bottom:22px}
.na-day-lbl{font-size:12px;font-weight:700;color:var(--vf);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.na-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:14px;margin-bottom:6px;cursor:pointer}
.na-card:hover{border-color:var(--vf)}
.na-time{font-size:12px;font-weight:700;color:var(--muted);min-width:52px}
.na-name{font-weight:700;color:#f1f5f9;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.na-phone{font-size:12px;color:var(--vf);font-weight:600;min-width:100px}
.na-period{font-size:10px;color:var(--muted);padding:2px 8px;border:1px solid var(--line);border-radius:20px;white-space:nowrap}
.ag-day{margin-bottom:22px}
.ag-day-lbl{font-size:13px;font-weight:700;color:var(--vf);border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:12px}
.ag-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;cursor:pointer}
.ag-card:hover{border-color:var(--vf)}
.ag-card.over{border-left:3px solid var(--vf)}
.ag-time{font-size:18px;font-weight:800;color:#f8fafc;min-width:58px}
.ag-card.over .ag-time{color:var(--vf)}
.ag-info{flex:1}
.ag-name{font-weight:700;font-size:14px}
.ag-meta{font-size:12px;color:var(--muted);margin-top:3px}
.ag-callbtn{background:rgba(22,163,74,.12);color:#4ade80;border:1px solid rgba(22,163,74,.3);padding:6px 12px;border-radius:8px;font-weight:700;font-size:12px;text-decoration:none}
.fid-alert-card{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;cursor:pointer}
.fid-alert-card.urgent{background:rgba(230,0,0,.07)!important;border-color:rgba(230,0,0,.3)!important}
.empty-state{color:var(--muted);text-align:center;padding:40px;font-size:13px}
.guia-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.tp-mode{background:rgba(230,0,0,.15);border:1px solid var(--vf);color:#fff;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.teleprompter{background:var(--bg2);border:2px solid var(--vf);border-radius:14px;padding:32px 40px;font-size:22px;line-height:2.1;color:#f8fafc;margin-bottom:20px;display:none;max-height:70vh;overflow-y:auto}
.teleprompter .gc{display:block;padding:12px 16px;border-left:3px solid var(--vf);margin:8px 0;font-style:italic;color:#e2e8f0}
.teleprompter h4{color:var(--vf);font-size:14px;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 8px}
.acc{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.acc summary{padding:14px 18px;font-weight:700;font-size:14px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;color:#f1f5f9}
.acc summary::-webkit-details-marker{display:none}
.acc summary::before{content:'▸';color:var(--vf);font-size:13px;transition:transform .15s}
.acc[open] summary::before{transform:rotate(90deg)}
.acc-body{padding:0 18px 18px;border-top:1px solid var(--line)}
.step{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:12px 0}
.step h4{margin-bottom:10px;color:var(--vf);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.gc{display:block;padding:8px 14px;border-left:3px solid var(--line2);margin:6px 0;font-size:13.5px;color:#cbd5e1;font-style:italic}
.tip{background:rgba(245,158,11,.08);border-left:3px solid var(--callback);padding:9px 12px;border-radius:6px;margin:8px 0;font-size:12.5px;color:#fde68a}
.warn{background:rgba(230,0,0,.08);border-left:3px solid var(--vf);padding:9px 12px;border-radius:6px;margin:8px 0;font-size:12.5px;color:#fca5a5}
.obj{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden}
.obj summary{padding:11px 14px;font-weight:700;cursor:pointer;list-style:none;background:var(--card2);font-size:13px;color:#f1f5f9}
.obj summary::-webkit-details-marker{display:none}
.obj summary::before{content:'❝ ';color:var(--vf)}
.obj .oa{padding:12px 14px;font-size:13px;line-height:1.7;color:#cbd5e1;background:var(--bg2)}
.objsearch{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 14px;color:#fff;font-size:13px;margin-bottom:12px}
.objsearch:focus{outline:none;border-color:var(--vf)}
.compare-table{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.compare-col{border-radius:12px;overflow:hidden}
.col-hdr{padding:12px 16px;font-weight:800;font-size:14px;text-align:center}
.col-meo .col-hdr{background:rgba(185,28,28,.8);color:#fff}
.col-vf .col-hdr{background:rgba(22,163,74,.8);color:#fff}
.compare-item{padding:9px 14px;font-size:12.5px;border-bottom:1px solid var(--line);background:var(--card)}
.compare-item:last-child{border-bottom:none}
.compare-item b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:2px}
.col-meo .compare-item{color:#fca5a5}
.col-vf .compare-item{color:#86efac}
table.t{width:100%;border-collapse:collapse;font-size:12.5px;margin:8px 0}
table.t th,table.t td{border:1px solid var(--line);padding:8px 10px;text-align:left}
table.t th{background:var(--card2);color:#f1f5f9;font-weight:700}
table.t td{color:#cbd5e1}
.tmeo{color:#f87171}
.tvf{color:#4ade80;font-weight:600}
.mand{counter-reset:m;list-style:none;padding:0}
.mand li{counter-increment:m;padding:10px 0 10px 40px;position:relative;border-bottom:1px solid var(--line);font-size:13.5px;color:#cbd5e1}
.mand li::before{content:counter(m);position:absolute;left:0;top:9px;background:var(--vf);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.spin{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--vf);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:860px){.crm-layout{grid-template-columns:1fr}.detail-pane{display:none}}
@media(max-width:640px){.hdr-stats{display:none}.compare-table{grid-template-columns:1fr}.result-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="vf-icon">JS</div>
      <h1>Jo Silva Vodafone</h1>
      <p>CRM — Conversão de clientes MEO</p>
    </div>
    <label class="lbl">Nome de utilizador</label>
    <input type="text" id="loginEmail" placeholder="josilva" autocomplete="username">
    <label class="lbl">Password</label>
    <input type="password" id="loginPwd" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div id="loginErr"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="hdr-avatar">JS</div>
    <div>
      <div class="hdr-name">Jo Silva Vodafone</div>
      <div class="hdr-sub">Conversão de clientes MEO</div>
    </div>
    <div class="hdr-stats" id="stats"></div>
    <button class="hdr-logout" onclick="doLogout()">Sair</button>
  </header>
  <nav class="tabs">
    <button class="active" data-tab="clientes">📇 Clientes</button>
    <button data-tab="noatend">📵 Não Atendidos <span id="naBadge"></span></button>
    <button data-tab="agenda">📅 Agenda <span id="agBadge"></span></button>
    <button data-tab="guia">📋 Guião</button>
  </nav>
  <main>
    <section id="tab-clientes">
      <div class="crm-layout">
        <div class="list-pane">
          <div class="toolbar">
            <div class="search-row"><input type="search" id="search" placeholder="🔍 Nome ou número..."></div>
            <div class="filter-row" id="filterRow"></div>
          </div>
          <div class="contact-list" id="contactList"><div style="padding:20px;color:var(--muted);text-align:center"><span class="spin"></span></div></div>
        </div>
        <div class="detail-pane" id="detailPane">
          <div class="detail-empty"><div class="big">📇</div><span>Seleciona um contacto</span></div>
        </div>
      </div>
    </section>
    <section id="tab-noatend" style="display:none">
      <h2 style="margin-bottom:16px;color:#f8fafc">📵 Não Atendidos</h2>
      <div class="period-bar">
        <button class="period-btn active" data-p="all">Todos</button>
        <button class="period-btn" data-p="manha">🌅 Manhã (8h–12h)</button>
        <button class="period-btn" data-p="almoco">🍽️ Almoço (12h–14h)</button>
        <button class="period-btn" data-p="tarde">☀️ Tarde (14h–19h)</button>
        <button class="period-btn" data-p="noite">🌙 Noite (19h–22h)</button>
      </div>
      <div id="naList"></div>
    </section>
    <section id="tab-agenda" style="display:none">
      <h2 style="margin-bottom:16px;color:#f8fafc">📅 Agenda & Alertas de Fidelização</h2>
      <div id="agendaContent"></div>
    </section>
    <section id="tab-guia" style="display:none">
      <div class="guia-toolbar">
        <button class="tp-mode" id="tpBtn" onclick="toggleTeleprompter()">📺 Modo Teleprompter</button>
        <span style="font-size:12px;color:var(--muted)">Lê linha a linha enquanto falas ao telefone</span>
      </div>
      <div class="teleprompter" id="teleprompter"></div>
      <div id="guiaContent"></div>
    </section>
  </main>
</div>

<script>
const SUPABASE_URL='https://oelbocimyfwwzkzbyswg.supabase.co';

// AUTH
async function doLogin(){
  const raw=document.getElementById('loginEmail').value.trim();
  const email=raw.includes('@')?raw:raw+'@crm.local';
  const pwd=document.getElementById('loginPwd').value;
  const pwd2=pwd==='2026'?'josilva2026':pwd;
  const err=document.getElementById('loginErr');
  err.textContent='';
  document.getElementById('loginBtn').textContent='A entrar...';
  let {error}=await sb.auth.signInWithPassword({email,password:pwd2});
  if(error){
    const r=await sb.auth.signUp({email,password:pwd});
    if(r.error){err.textContent=r.error.message;document.getElementById('loginBtn').textContent='Entrar';return;}
    const r2=await sb.auth.signInWithPassword({email,password:pwd2});
    if(r2.error){err.textContent=r2.error.message;document.getElementById('loginBtn').textContent='Entrar';return;}
  }
  document.getElementById('loginBtn').textContent='Entrar';
}
async function doLogout(){try{await sb.auth.signOut();}catch(e){}location.reload();}
document.getElementById('loginPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

sb.auth.onAuthStateChange(async(event,session)=>{
  if(session){
    if(_appLoaded)return;
    _appLoaded=true;
    userId=session.user.id;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    try{await loadData();}catch(e){document.getElementById('contactList').innerHTML='<div style="padding:20px;color:#f87171">Erro loadData: '+e.message+'</div>';return;}
    renderAll();
    renderGuia();
  }else{
    _appLoaded=false;
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

// DATA
async function loadData(){
  const {data:rows,error}=await sb.from('crm_contacts').select('*').eq('user_id',userId).order('nome_display');
  if(error){document.getElementById('contactList').innerHTML='<div style="padding:20px;color:#f87171">Erro: '+error.message+'</div>';return;}
  if(!rows.length){
    const insert=SEED.map(c=>({user_id:userId,nic:c.nic,nome:c.nome,nome_display:c.nome_display,
      dif:c.dif,dip:c.dip,phones:c.phones,tarifario:c.tarifario,operadora:c.operadora||'MEO',
      fid:null,status:'todo',notes:'',next_callback:null,last_result:''}));
    const {error:e2}=await sb.from('crm_contacts').insert(insert);
    if(e2)console.error(e2);
    const {data:rows2}=await sb.from('crm_contacts').select('*').eq('user_id',userId).order('nome_display');
    contacts=await attachHistory(rows2||[]);
  }else{contacts=await attachHistory(rows);}
}
async function attachHistory(rows){
  if(!rows.length)return[];
  const ids=rows.map(r=>r.id);
  const {data:hist}=await sb.from('crm_call_history').select('*').eq('user_id',userId).order('called_at');
  const byId={};
  (hist||[]).forEach(h=>{(byId[h.contact_id]=byId[h.contact_id]||[]).push(h);});
  return rows.map(r=>(({...r,history:byId[r.id]||[]})));
}
async function saveContact(id,patch){
  const {error}=await sb.from('crm_contacts').update(patch).eq('id',id).eq('user_id',userId);
  if(error)console.error(error);
  const c=contacts.find(x=>x.id===id);
  if(c)Object.assign(c,patch);
}
async function addHistory(contactId,type,result,notes){
  const entry={contact_id:contactId,user_id:userId,type,result,notes,called_at:new Date().toISOString()};
  const {data,error}=await sb.from('crm_call_history').insert(entry).select().single();
  if(error){console.error(error);return;}
  const c=contacts.find(x=>x.id===contactId);
  if(c)c.history.push(data);
  return data;
}

// RENDER
function renderAll(){renderStats();renderList();}
function fmtDate(s){if(!s)return'—';return new Date(s).toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDT(s){if(!s)return'—';return new Date(s).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function isOverdue(s){return s&&new Date(s)<new Date();}
function initials(n){const w=n.split(' ').filter(Boolean);return(w[0][0]+(w[1]?w[1][0]:'')).toUpperCase();}
function fidDays(fid){if(!fid)return null;return Math.round((new Date(fid)-new Date())/86400000);}
function stColor(s){return({todo:'var(--todo)',callback:'var(--callback)',nego:'var(--nego)',won:'var(--won)',lost:'var(--lost)'}[s]||'var(--todo)');}

function renderStats(){
  const all=contacts;
  const cnt=k=>all.filter(c=>c.status===k).length;
  const cbToday=all.filter(c=>c.next_callback&&new Date(c.next_callback).toDateString()===new Date().toDateString()).length;
  const overdue=all.filter(c=>c.status!=='won'&&c.status!=='lost'&&isOverdue(c.next_callback)).length;
  document.getElementById('stats').innerHTML=`
    <div class="hstat"><b>${all.length}</b><span>Total</span></div>
    <div class="hstat"><b>${cbToday}</b><span>CB hoje</span></div>
    <div class="hstat"><b>${cnt('won')}</b><span>Fechados</span></div>
    <div class="hstat"><b>${cnt('nego')}</b><span>Negoc.</span></div>`;
  document.getElementById('agBadge').innerHTML=overdue?`<span style="background:var(--vf);color:#fff;padding:1px 6px;border-radius:20px;font-size:10px;margin-left:4px">${overdue}</span>`:'';
  const na=contacts.filter(c=>c.history.some(h=>h.result&&h.result.includes('Não atendeu')));
  document.getElementById('naBadge').innerHTML=na.length?`<span style="background:var(--muted);color:#fff;padding:1px 6px;border-radius:20px;font-size:10px;margin-left:4px">${na.length}</span>`:'';
}

function matchContact(c){
  if(curFilter!=='todos'&&c.status!==curFilter)return false;
  if(curSearch){const q=curSearch.toLowerCase();if(!c.nome_display.toLowerCase().includes(q)&&!(c.phones||[]).join(' ').includes(q))return false;}
  return true;
}

function renderList(){
  const fr=document.getElementById('filterRow');
  const allFilters=[['todos','Todos'],...Object.entries(STATUSES).map(([k,v])=>[k,v.label])];
  fr.innerHTML=allFilters.map(([k,l])=>{
    const dot=k!=='todos'?`<span class="fdot" style="background:${stColor(k)}"></span>`:'';
    return`<button class="fbtn${curFilter===k?' active':''}" onclick="setFilter('${k}')">${dot}${l}</button>`;
  }).join('');
  const cl=document.getElementById('contactList');
  const items=contacts.filter(matchContact).sort((a,b)=>{
    const ao=isOverdue(a.next_callback)?0:1,bo=isOverdue(b.next_callback)?0:1;
    if(ao!==bo)return ao-bo;
    return a.nome_display.localeCompare(b.nome_display);
  });
  if(!items.length){cl.innerHTML='<div style="color:var(--muted);text-align:center;padding:30px;font-size:13px">Nenhum contacto encontrado</div>';return;}
  cl.innerHTML=items.map(c=>{
    const ph=(c.phones||[])[0];
    const fd=fidDays(c.fid);
    let fBadge='';
    if(fd!==null&&fd<=60)fBadge=`<span class="fid-warn${fd<=30?' fid-urgent':''}">📅 ${fd>0?fd+'d':'venceu'}</span>`;
    const lastH=c.history.length?c.history[c.history.length-1]:null;
    return`<div class="ccard${selId===c.id?' selected':''}" style="border-left-color:${stColor(c.status)}" onclick="selectContact('${c.id}')">
      <div class="cn">${c.nome_display}</div>
      <div class="cp">${ph?'📱 '+ph:'<span style="color:var(--muted)">sem número</span>'}</div>
      <div class="cm">
        <span class="stbadge" style="background:${stColor(c.status)}22;color:${stColor(c.status)};border:1px solid ${stColor(c.status)}44">${STATUSES[c.status]?.label||c.status}</span>
        ${fBadge}
        ${lastH?`<span class="atbadge">${fmtDT(lastH.called_at)}</span>`:''}
        <span class="atbadge">${c.history.filter(h=>h.type==='call').length} tent.</span>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f){curFilter=f;renderList();}
document.getElementById('search').oninput=e=>{curSearch=e.target.value;renderList();};

function selectContact(id){
  selId=id;
  renderList();
  renderDetail();
  const dp=document.getElementById('detailPane');
  if(dp)dp.style.display='block';
}

    <div class="detail-content">
      <div class="det-header">

        <div class="kv"><div class="kv-lbl">DIP</div><div class="kv-val">${c.dip||'—'}</div></div>
        <div class="kv"><div class="kv-lbl">Operadora</div><div class="kv-val">${c.operadora||'MEO'}</div></div>
        <div class="kv" style="grid-column:1/-1"><div class="kv-lbl">Tarifário MEO</div><div class="kv-val" style="font-size:12px">${c.tarifario||'—'}</div></div>
      </div>
      <div class="section"><div class="sec-lbl">Resultado da chamada</div><div class="result-grid">${resBtns}</div></div>
      <div class="row2">
        <div><div class="sec-lbl">Estado</div><select id="d-status" onchange="updateStatus('${c.id}',this.value)">${statusOpts}</select></div>
        <div><div class="sec-lbl">Próximo callback</div><input type="datetime-local" id="d-cb" value="${c.next_callback?c.next_callback.slice(0,16):''}" onchange="updateCallback('${c.id}',this.value)"></div>

        <div class="sec-lbl">Data de Fidelização <span style="font-size:10px;font-weight:400;color:var(--muted)">(preenche quando o cliente informa)</span></div>

      <div class="section"><div class="sec-lbl">Histórico de contactos</div><div class="hist">${hist}</div></div>
    </div>
    <div class="save-bar">
      <button class="btn btn-ghost" onclick="saveNotes('${c.id}')">💾 Guardar notas</button>
      <button class="btn btn-red" onclick="logCall('${c.id}')">📞 Registar chamada agora</button>

async function setResult(id,r){
  const c=contacts.find(x=>x.id===id);if(!c)return;
  c.last_result=r;
  let s=c.status;
  if(r.includes('FECHOU'))s='won';
  else if(r==='Sem interesse')s='lost';
  else if(r==='Pediu callback')s='callback';
  else if(r.includes('interessado')||r.includes('pensar'))s='nego';
  c.status=s;
  await saveContact(id,{last_result:r,status:s});
  renderDetail();renderList();renderStats();
}
async function updateStatus(id,v){await saveContact(id,{status:v});renderList();renderStats();}
async function updateCallback(id,v){await saveContact(id,{next_callback:v?new Date(v).toISOString():null});renderStats();}
async function updateFid(id,v){await saveContact(id,{fid:v||null});renderDetail();renderList();renderStats();}
async function saveNotes(id){const t=document.getElementById('d-notes');if(t)await saveContact(id,{notes:t.value});}
async function logCall(id){
  const c=contacts.find(x=>x.id===id);if(!c)return;
  await saveNotes(id);
  await addHistory(id,'call',c.last_result||'Chamada efetuada',c.notes||'');
  renderDetail();renderStats();renderNaoAtend();
}

// NÃO ATENDIDOS
function getPeriod(dt){
  if(!dt)return null;
  const h=new Date(dt).getHours();
  if(h>=8&&h<12)return'manha';
  if(h>=12&&h<14)return'almoco';
  if(h>=14&&h<19)return'tarde';
  if(h>=19&&h<22)return'noite';
  return'outro';
}
function renderNaoAtend(){
  let entries=[];
  contacts.forEach(c=>{
    c.history.filter(h=>h.result&&h.result.includes('Não atendeu')).forEach(h=>{entries.push({contact:c,h});});
  });
  if(curPeriod!=='all')entries=entries.filter(e=>getPeriod(e.h.called_at)===curPeriod);
  entries.sort((a,b)=>new Date(b.h.called_at)-new Date(a.h.called_at));
  const groups={};
  entries.forEach(e=>{const d=new Date(e.h.called_at).toDateString();(groups[d]=groups[d]||[]).push(e);});
  const nl=document.getElementById('naList');
  if(!entries.length){nl.innerHTML='<div class="empty-state">Sem registos de não atendidos neste período.</div>';return;}
  const PL={manha:'🌅 Manhã',almoco:'🍽️ Almoço',tarde:'☀️ Tarde',noite:'🌙 Noite',outro:'🕐 Outro'};
  nl.innerHTML=Object.keys(groups).map(day=>{
    const d=new Date(day);
    const isToday=d.toDateString()===new Date().toDateString();
    const lbl=isToday?'🔴 HOJE — '+d.toLocaleDateString('pt-PT',{weekday:'long',day:'2-digit',month:'long'}):d.toLocaleDateString('pt-PT',{weekday:'long',day:'2-digit',month:'long'});
    return`<div class="na-day"><div class="na-day-lbl">${lbl} <span style="background:var(--card);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:10px">${groups[day].length}</span></div>
      ${groups[day].map(e=>{
        const p=getPeriod(e.h.called_at);
        return`<div class="na-card" onclick="selectContact('${e.contact.id}');switchTab('clientes')">
          <div class="na-time">${new Date(e.h.called_at).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="na-name">${e.contact.nome_display}</div>
          <div class="na-phone">${(e.contact.phones||[])[0]||'—'}</div>
          <div class="na-period">${PL[p]||''}</div>
          <a class="callbtn" href="tel:${(e.contact.phones||[])[0]||''}" style="font-size:12px;padding:5px 10px" onclick="event.stopPropagation()">📞</a>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// AGENDA
function renderAgenda(){
  const el=document.getElementById('agendaContent');
  const callbacks=contacts.filter(c=>c.next_callback&&c.status!=='won'&&c.status!=='lost').sort((a,b)=>new Date(a.next_callback)-new Date(b.next_callback));
  const fidAlerts=contacts.filter(c=>{const d=fidDays(c.fid);return d!==null&&d<=60&&c.status!=='won'&&c.status!=='lost';}).sort((a,b)=>fidDays(a.fid)-fidDays(b.fid));
  let html='';
  if(fidAlerts.length){
    html+=`<div style="margin-bottom:24px"><div class="ag-day-lbl">📅 Fidelizações a vencer em breve</div>`;
    html+=fidAlerts.map(c=>{const d=fidDays(c.fid);return`<div class="fid-alert-card${d<=30?' urgent':''}" onclick="selectContact('${c.id}');switchTab('clientes')">
      <div style="font-size:22px">${d<=30?'🔴':'🟡'}</div>
      <div style="flex:1"><div class="ag-name">${c.nome_display}</div><div class="ag-meta">Fidelização termina em ${d} dias (${fmtDate(c.fid)}) · ${(c.phones||[])[0]||'sem nº'}</div></div>
      <a class="ag-callbtn" href="tel:${(c.phones||[])[0]||''}" onclick="event.stopPropagation()">📞 Ligar</a>
    </div>`;}).join('');
    html+='</div>';
  }
  if(!callbacks.length&&!fidAlerts.length){el.innerHTML='<div class="empty-state">Sem callbacks agendados nem fidelizações próximas.</div>';return;}
  if(!callbacks.length){el.innerHTML=html;return;}
  const groups={};
  callbacks.forEach(c=>{const d=new Date(c.next_callback).toDateString();(groups[d]=groups[d]||[]).push(c);});
  html+=Object.keys(groups).map(day=>{
    const d=new Date(day);const today=d.toDateString()===new Date().toDateString();
    const lbl=today?'🔴 HOJE — '+d.toLocaleDateString('pt-PT',{weekday:'long',day:'2-digit',month:'long'}):d.toLocaleDateString('pt-PT',{weekday:'long',day:'2-digit',month:'long'});
    return`<div class="ag-day"><div class="ag-day-lbl">${lbl}</div>
      ${groups[day].map(c=>{const over=isOverdue(c.next_callback);return`<div class="ag-card${over?' over':''}" onclick="selectContact('${c.id}');switchTab('clientes')">
        <div class="ag-time">${new Date(c.next_callback).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})}</div>
        <div class="ag-info"><div class="ag-name">${c.nome_display}${over?' <span class="fid-warn fid-urgent">em atraso</span>':''}</div><div class="ag-meta">${(c.phones||[])[0]||'sem nº'} · ${STATUSES[c.status]?.label||c.status}${c.notes?' · '+c.notes.slice(0,50):''}</div></div>
        <a class="ag-callbtn" href="tel:${(c.phones||[])[0]||''}" onclick="event.stopPropagation()">📞 Ligar</a>
      </div>`;}).join('')}
    </div>`;
  }).join('');
  el.innerHTML=html;
}

// TABS
function switchTab(tab){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  ['clientes','noatend','agenda','guia'].forEach(t=>{const s=document.getElementById('tab-'+t);if(s)s.style.display=t===tab?'':'none';});
  if(tab==='agenda')renderAgenda();
  if(tab==='noatend')renderNaoAtend();
}
document.querySelectorAll('nav.tabs button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
